name: Reusable Docker Build and Push

on:
  workflow_call:
    inputs:
      image_name:
        required: false
        type: string
      context:
        required: false
        type: string
        default: .
      dockerfile:
        required: false
        type: string
        default: ./Dockerfile
      pre_build_script:
        required: false
        type: string
    secrets:
      REGISTRY_USERNAME:
        required: true
      REGISTRY_PASSWORD:
        required: true
      APP_SETTINGS:
        required: false
      REPO_TOKEN:
        required: false
      registry:
        required: true
    outputs:
      image:
        description: Built image name
        value: ${{ jobs.build-and-push.outputs.image }}
      tag:
        description: Built image tag
        value: ${{ jobs.build-and-push.outputs.tag }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.vars.outputs.image }}
      tag: ${{ steps.vars.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.REPO_TOKEN || github.token }}

      - name: Resolve image name and version
        id: vars
        shell: bash
        run: |
          if [ -n "${{ inputs.image_name }}" ]; then
            REPO_NAME="${{ inputs.image_name }}"
          else
            REPO_NAME="${GITHUB_REPOSITORY#*/}"
          fi

          RAW_REF="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"

          SAFE_REF="$(echo "${RAW_REF}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9._-]/-/g' \
            | sed 's/--*/-/g' \
            | sed 's/^-//' \
            | sed 's/-$//')"

          VERSION_TAG="${SAFE_REF}-${GITHUB_RUN_ID}"
          IMAGE="${{ inputs.registry }}/${REPO_NAME}:${VERSION_TAG}"

          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${VERSION_TAG}" >> "$GITHUB_OUTPUT"

      - name: Ensure Dockerfile exists
        shell: bash
        run: |
          test -f "${{ inputs.dockerfile }}" || (echo "Dockerfile not found at ${{ inputs.dockerfile }}" && exit 1)

      - name: Run pre-build script
        if: ${{ inputs.pre_build_script != '' }}
        shell: bash
        env:
          APP_SETTINGS: ${{ secrets.APP_SETTINGS }}
        run: |
          set -euo pipefail
          ${{ inputs.pre_build_script }}

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push versioned image
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: ${{ steps.vars.outputs.image }}