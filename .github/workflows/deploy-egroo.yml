name: deploy-egroo

env:
  IMAGE_TAG: ${{ github.sha }}

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Select what to deploy'
        required: true
        default: 'both'
        type: choice
        options:
          - api
          - client
          - both

jobs:
  dotnet-build-api:
    name: Dotnet Build api
    if: ${{ inputs.deploy_target == 'api' || inputs.deploy_target == 'both' }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore src/Egroo.Server/Egroo.Server.csproj
    - name: Build
      run: dotnet build --no-restore src/Egroo.Server/Egroo.Server.csproj
    - name: Test
      run: dotnet test --no-build --verbosity normal src/Egroo.Server/Egroo.Server.csproj
  docker-build-api:
    name: Docker Build api
    if: ${{ inputs.deploy_target == 'api' || inputs.deploy_target == 'both' }}
    environment:
      name: 'Release API'
      url: "https://api.egroo.org"
    needs: dotnet-build-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create appsettings
        env:
            APPSETTINGS_JSON: "${{ secrets.APPSETTINGS_PROD }}"
        run: |
            printf '%s' "$APPSETTINGS_JSON" > src/Egroo.Server/appsettings.json
      - name: build docker image
        run: docker build -t jihadkhawaja/egroo-server-prod:${IMAGE_TAG} -t jihadkhawaja/egroo-server-prod:latest -f src/Egroo.Server/Dockerfile .
      - name: save docker image
        run: |
             docker save -o egroo-server-prod.tar jihadkhawaja/egroo-server-prod:${IMAGE_TAG}
      - name: copy tar via ssh
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.KEY }}
          port: 22
          source: "egroo-server-prod.tar"
          target: "/home/ubuntu/configurations/images"
      - name: executing remote ssh commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.KEY }}
          script: |
            docker load -i /home/ubuntu/configurations/images/egroo-server-prod.tar
            rm /home/ubuntu/configurations/images/egroo-server-prod.tar
  dotnet-build-wasm:
    name: Dotnet Build wasm
    if: ${{ inputs.deploy_target == 'client' || inputs.deploy_target == 'both' }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore src/Egroo/Egroo/Egroo.csproj
    - name: Build
      run: dotnet build --no-restore src/Egroo/Egroo/Egroo.csproj
    - name: Test
      run: dotnet test --no-build --verbosity normal src/Egroo/Egroo/Egroo.csproj
  docker-build-wasm:
    name: Docker Build wasm
    if: ${{ inputs.deploy_target == 'client' || inputs.deploy_target == 'both' }}
    environment:
      name: 'Release WEB'
      url: "https://www.egroo.org"
    needs: [dotnet-build-wasm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: build docker image
        run: docker build -t jihadkhawaja/egroo-client-prod:${IMAGE_TAG} -t jihadkhawaja/egroo-client-prod:latest -f src/Egroo/Egroo/Dockerfile .
      - name: save docker image
        run: |
             docker save -o egroo-client-prod.tar jihadkhawaja/egroo-client-prod:${IMAGE_TAG}
      - name: copy tar via ssh
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.KEY }}
          port: 22
          source: "egroo-client-prod.tar"
          target: "/home/ubuntu/configurations/images"
      - name: executing remote ssh commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.KEY }}
          script: |
            docker load -i /home/ubuntu/configurations/images/egroo-client-prod.tar
            rm /home/ubuntu/configurations/images/egroo-client-prod.tar
  docker-compose:
    name: Docker Compose
    needs: [docker-build-wasm, docker-build-api]
    if: always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') && (needs.docker-build-api.result == 'success' || needs.docker-build-wasm.result == 'success')
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v4
        - name: copy docker-compose via ssh
          uses: appleboy/scp-action@v0.1.3
          with:
            host: ${{ secrets.REMOTE_HOST }}
            username: ${{ secrets.REMOTE_USER }}
            key: ${{ secrets.KEY }}
            port: 22
            source: "docker-compose-egroo.yml"
            target: "/home/ubuntu/configurations/docker_compose_configs"
        - name: executing remote ssh commands
          uses: appleboy/ssh-action@master
          with:
            host: ${{ secrets.REMOTE_HOST }}
            username: ${{ secrets.REMOTE_USER }}
            key: ${{ secrets.KEY }}
            script: |
                ENV_FILE=/home/ubuntu/configurations/docker_compose_configs/egroo.env
                COMPOSE_FILE=/home/ubuntu/configurations/docker_compose_configs/docker-compose-egroo.yml

                mkdir -p /home/ubuntu/configurations/docker_compose_configs
                touch "$ENV_FILE"

                if ! grep -q '^API_IMAGE_TAG=' "$ENV_FILE"; then
                  echo 'API_IMAGE_TAG=latest' >> "$ENV_FILE"
                fi

                if ! grep -q '^WEB_IMAGE_TAG=' "$ENV_FILE"; then
                  echo 'WEB_IMAGE_TAG=latest' >> "$ENV_FILE"
                fi

                case "${{ inputs.deploy_target }}" in
                  api)
                    sed -i "s/^API_IMAGE_TAG=.*/API_IMAGE_TAG=${{ github.sha }}/" "$ENV_FILE"
                    docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" up -d --pull never --no-deps --force-recreate egroo-api
                    ;;
                  client)
                    sed -i "s/^WEB_IMAGE_TAG=.*/WEB_IMAGE_TAG=${{ github.sha }}/" "$ENV_FILE"
                    docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" up -d --pull never --no-deps --force-recreate egroo-web
                    ;;
                  both)
                    sed -i "s/^API_IMAGE_TAG=.*/API_IMAGE_TAG=${{ github.sha }}/" "$ENV_FILE"
                    sed -i "s/^WEB_IMAGE_TAG=.*/WEB_IMAGE_TAG=${{ github.sha }}/" "$ENV_FILE"
                    docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" up -d --pull never --force-recreate egroo-api egroo-web
                    ;;
                esac

                docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" ps
                docker image prune -f