name: Coverage

permissions:
  contents: write
  pull-requests: write

on:
  pull_request:

  push:
    branches:
      - main
    paths-ignore:
      - docs/badges/**

  workflow_dispatch:

jobs:
  coverage:
    name: Test, Coverage & Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore src/Egroo.Server.Test/Egroo.Server.Test.csproj

      - name: Build
        run: dotnet build --no-restore --configuration Release src/Egroo.Server.Test/Egroo.Server.Test.csproj

      - name: Test with coverage
        run: >
          dotnet test --no-build --configuration Release
          --logger "trx;LogFileName=coverage-tests.trx"
          --results-directory src/Egroo.Server.Test/TestResults/TestRun
          /p:CollectCoverage=true
          /p:CoverletOutputFormat=cobertura
          /p:CoverletOutput=TestResults/Coverage/coverage
          src/Egroo.Server.Test/Egroo.Server.Test.csproj

      - name: Generate coverage report
        shell: pwsh
        env:
          REPORTGENERATOR_LICENSE: ${{ secrets.REPORTGENERATOR_LICENSE }}
        run: ./scripts/generate-coverage-report.ps1

      - name: Publish coverage summary
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "src/Egroo.Server.Test/TestResults/CoverageReport/Summary.txt") {
            $summary = Get-Content "src/Egroo.Server.Test/TestResults/CoverageReport/Summary.txt" | Select-Object -First 20 | Out-String
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value "## Coverage Summary"
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```text'
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value $summary
            Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value '```'
          }

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-test-results
          path: src/Egroo.Server.Test/TestResults/TestRun/*.trx
          retention-days: 30

      - name: Upload Coverage Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            src/Egroo.Server.Test/TestResults/Coverage/coverage.cobertura.xml
            src/Egroo.Server.Test/TestResults/CoverageReport/**
          retention-days: 30

      - name: Update repository coverage badge files
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "docs/badges" | Out-Null
          Copy-Item "src/Egroo.Server.Test/TestResults/CoverageReport/badge_linecoverage.svg" "docs/badges/coverage.svg" -Force
          Copy-Item "src/Egroo.Server.Test/TestResults/CoverageReport/Summary.txt" "docs/badges/coverage-summary.txt" -Force

      - name: Create coverage badge pull request
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: update coverage badge"
          branch: github-actions/update-coverage-badge
          delete-branch: true
          title: "chore: update coverage badge"
          body: |
            Automated update for repository coverage badge assets.

            This change was generated by the coverage workflow after a successful push to main.
          add-paths: |
            docs/badges/coverage.svg
            docs/badges/coverage-summary.txt
